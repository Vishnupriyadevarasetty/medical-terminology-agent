name: Medical Terminology Agent CI/CD

on:
  push:
    branches:
      - main

env:
  PYTHONPATH: src
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET: medical-terminology-agent-225602822766

jobs:
  build-test-package:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run Unit Tests
        run: |
          pytest

      - name: Verify Code Coverage
        run: |
          pytest --cov=medical_terminology_agent --cov-fail-under=90

      - name: Create Deployment Package
        run: |
          zip -r medical-terminology-agent.zip . \
            -x ".git/*" \
            -x ".venv/*" \
            -x "__pycache__/*" \
            -x ".pytest_cache/*"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Package to S3
        run: |
          aws s3 cp medical-terminology-agent.zip s3://$S3_BUCKET/